<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Autorización de Orden de Trabajo — MS3 FacilityTrack</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#1a1a1a;color:#eee;padding:24px;max-width:680px;margin:0 auto}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .logo-text{font-size:18px;font-weight:700;color:#b8860b}
  .logo-sub{font-size:11px;color:#888;margin-top:2px}
  h2{color:#eee;font-size:20px;margin-bottom:4px}
  .subtitle{color:#888;font-size:13px;margin-bottom:24px}
  .card{background:#2a2a2a;border:1px solid #444;border-radius:12px;padding:20px;margin-bottom:16px}
  .label{font-size:10px;color:#b8860b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
  .value{font-size:14px;color:#ddd;margin-bottom:14px;line-height:1.5}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .badge-urgente{background:#e5393522;color:#ef5350;border:1px solid #e5393560}
  .badge-proximo{background:#f9a82522;color:#ffb300;border:1px solid #f9a82560}
  .badge-programable{background:#43a04722;color:#66bb6a;border:1px solid #43a04760}
  .fotos{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:10px}
  .fotos img{width:100%;height:120px;object-fit:cover;border-radius:8px;border:1px solid #444;cursor:pointer}
  ul{padding-left:18px;color:#aaa;font-size:13px;line-height:1.8}
  .section-title{font-size:12px;font-weight:700;color:#b8860b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #333}
  .auth-box{background:#1e1e1e;border:1px solid #444;border-radius:12px;padding:24px;margin-top:8px}
  .auth-box input,.auth-box textarea{width:100%;background:#2a2a2a;border:1px solid #555;border-radius:8px;padding:12px;color:#eee;font-size:14px;margin-top:6px;margin-bottom:16px;font-family:inherit}
  .auth-box textarea{min-height:80px;resize:vertical}
  .btn-authorize{background:#4caf50;color:#fff;font-weight:700;border:none;border-radius:8px;padding:14px 24px;font-size:15px;cursor:pointer;width:100%;margin-bottom:10px}
  .btn-reject{background:#2a2a2a;color:#ef5350;font-weight:700;border:1px solid #ef535060;border-radius:8px;padding:14px 24px;font-size:15px;cursor:pointer;width:100%}
  .btn-authorize:disabled,.btn-reject:disabled{opacity:.4;cursor:default}
  #status{margin-top:20px;padding:20px;border-radius:12px;text-align:center;display:none}
  .status-ok{background:#1a3a1a;border:1px solid #2a7a2a;color:#5aea5a}
  .status-reject{background:#3a1a1a;border:1px solid #7a2a2a;color:#ea5a5a}
  .status-done{background:#1a2a3a;border:1px solid #2a4a7a;color:#5a9aea}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid #ffffff44;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  #reject-section{display:none;margin-top:10px}
  .pipeline{display:flex;align-items:center;margin:16px 0 4px}
  .pip-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
  .pip-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .pip-label{font-size:9px;text-align:center;font-weight:600}
  .pip-line{flex:1;height:2px;margin-top:14px}
  .not-found{text-align:center;padding:60px 20px;color:#888}
  .not-found .icon{font-size:48px;margin-bottom:16px}
</style>
</head>
<body>

<div class="logo">
  <div>
    <div class="logo-text">MS3 FacilityTrack</div>
    <div class="logo-sub">Laboratorio Ramos · Sistema de Mantenimiento</div>
  </div>
</div>

<div id="loading" style="text-align:center;padding:60px;color:#888">
  <div class="spinner" style="width:24px;height:24px;border-width:3px;display:inline-block"></div>
  <div style="margin-top:12px">Cargando folio...</div>
</div>

<div id="app" style="display:none"></div>
<div id="status"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            "AIzaSyAtr22Q0JcpceXgfJSzja0fP1QCRkD8kS0",
  authDomain:        "ms3-labramos-facilitytrack.firebaseapp.com",
  projectId:         "ms3-labramos-facilitytrack",
  storageBucket:     "ms3-labramos-facilitytrack.firebasestorage.app",
  messagingSenderId: "971160584481",
  appId:             "1:971160584481:web:2d68aae747ac72ada37e60"
});
const db = firebase.firestore();

const params  = new URLSearchParams(location.search);
const folioId = params.get('f');
const authId  = params.get('aid'); // nuevo flujo incidente→OT

const urgBadge = {urgente:'badge-urgente',proximo:'badge-proximo',programable:'badge-programable'};
const urgLabel = {urgente:'🔴 Urgente', proximo:'🟡 Próximo', programable:'🟢 Programable'};
const etapaLabel = {reporte:'Reporte', orden_trabajo:'Orden de Trabajo', bitacora_final:'Bitácora Final', cerrado:'Cerrado'};
const etapaColor = {reporte:'#b8860b', orden_trabajo:'#2196f3', bitacora_final:'#9c27b0', cerrado:'#4caf50'};

async function init() {
  if (authId) { await initAutorizacion(); return; }
  if (!folioId) { showError('No se especificó un folio. Verifica que el link sea correcto.'); return; }
  try {
    const doc = await db.collection('folios').doc(folioId).get();
    if (!doc.exists) { showError('Folio no encontrado. El link puede ser incorrecto o el folio fue eliminado.'); return; }
    renderFolio({ id: doc.id, ...doc.data() });
  } catch(e) { showError('Error al cargar el folio: ' + e.message); }
}

// ── Nuevo flujo: autorización de OT vinculada a incidente ─────────────
async function initAutorizacion(){
  try {
    const doc = await db.collection('autorizaciones').doc(authId).get();
    if(!doc.exists){ showError('Solicitud de autorización no encontrada. El link puede ser incorrecto.'); return; }
    renderAutorizacion({ id:doc.id, ...doc.data() });
  } catch(e){ showError('Error al cargar: ' + e.message); }
}

function renderAutorizacion(data){
  document.getElementById('loading').style.display='none';
  const app = document.getElementById('app');
  app.style.display='block';

  const suc  = data.sucursal||{};
  const inc  = data.incidente||{};
  const ots  = data.ordenes_trabajo||[];
  const an   = inc.analisis_ms3||null;
  const seg  = inc.seguimiento||[];
  const auth = data.estado_autorizacion;
  const rec  = data.receptor||{};
  const fmtDT = iso => { if(!iso)return'—'; const d=new Date(iso); return d.toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'})+' '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}); };

  // Fotos del incidente
  const fotoSection = inc.fotoBase64
    ? `<div class="fotos"><img src="${inc.fotoBase64}" onclick="window.open(this.src)"></div>` : '';
  const fotosAd = (inc.fotos_adicionales||[]).filter(f=>f.base64||f.url);
  const fotosAdHtml = fotosAd.length
    ? `<div class="fotos">${fotosAd.map(f=>`<img src="${f.base64||f.url}" onclick="window.open(this.src)" title="${f.titulo||''}">`).join('')}</div>` : '';

  // Plano con pin
  const planoHtml = (inc.ubicacion_plano && inc.plano_base64)
    ? `<div style="position:relative;display:inline-block;max-width:100%;margin:8px 0;border-radius:8px;overflow:hidden;border:1px solid #444">
        <img src="${inc.plano_base64}" style="max-width:100%;display:block">
        <div style="position:absolute;left:${inc.ubicacion_plano.x_pct*100}%;top:${inc.ubicacion_plano.y_pct*100}%;transform:translate(-50%,-50%)">
          <div style="width:20px;height:20px;background:#d32f2f;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.6)"></div>
        </div>
      </div>` : '';

  // Timeline seguimiento
  const segHtml = seg.length
    ? seg.map(s=>`<div style="padding:10px 0;border-bottom:1px solid #333">
        <div style="font-size:10px;color:#b8860b;margin-bottom:3px">${fmtDT(s.fecha)} · ${s.tipo||'nota'}</div>
        <div style="font-size:13px;color:#ddd">${s.nota||s.texto||''}</div>
        ${(s.fotos||[]).length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${s.fotos.map(f=>`<img src="${f.base64}" style="width:80px;height:65px;object-fit:cover;border-radius:6px;border:1px solid #444;cursor:pointer" onclick="window.open(this.src)">`).join('')}</div>`:''}
      </div>`).join('')
    : '<div style="color:#666;font-size:13px">Sin seguimiento registrado</div>';

  // Análisis técnico
  const accionLabel={'orientacion-insitu':'Orientación in situ','gestion-arrendador':'Gestión con arrendador','garantia':'Cubierto por garantía','cotizacion-fisica':'Requiere cotización / intervención física','resolucion-remota':'Resolución remota'};
  const anHtml = an
    ? `<div class="card" style="border-color:#2a4a6a">
        <div class="section-title" style="color:#6fb0e0">📋 Análisis Técnico MS3</div>
        ${an.escala?`<div class="label">Escala del problema</div><div class="value"><span class="badge" style="background:#2a2a2a;color:#fff;border:1px solid #555">${an.escala.toUpperCase()}</span></div>`:''}
        ${an.naturaleza?`<div class="label">Naturaleza</div><div class="value">${an.naturaleza}</div>`:''}
        ${an.causa_probable?`<div class="label">Causa probable</div><div class="value" style="color:#aaa">${an.causa_probable}</div>`:''}
        ${an.accion_recomendada?`<div class="label">Acción recomendada</div><div class="value" style="color:#6fb0e0">${accionLabel[an.accion_recomendada]||an.accion_recomendada}</div>`:''}
        ${an.observaciones?`<div class="label">Observaciones</div><div class="value" style="color:#aaa;white-space:pre-wrap">${an.observaciones}</div>`:''}
        ${an.analizado_por?`<div style="font-size:11px;color:#666;margin-top:6px">👤 ${an.analizado_por} · ${an.fecha||''}</div>`:''}
      </div>` : '';

  // Órdenes de trabajo
  const otCards = ots.map((t,idx)=>{
    const adjHtml = (t.adjuntos||[]).map(a=>{
      if((a.tipo||'').startsWith('image/')){
        return `<img src="${a.data}" style="width:100%;height:130px;object-fit:cover;border-radius:6px;border:1px solid #444;cursor:pointer;display:block" onclick="window.open(this.src)" title="${a.nombre||''}">`;
      }
      return `<div style="padding:8px 10px;background:#2a2a2a;border:1px solid #444;border-radius:6px;font-size:11px;color:#aaa">📄 ${a.nombre||'Adjunto '+(idx+1)}</div>`;
    }).join('');
    return `<div class="card" style="border-color:#b8860b55">
      <div class="section-title">📋 OT ${idx+1} — ${t.tipo||''}</div>
      <div class="label">Categoría</div><div class="value">${t.categoria||'—'}</div>
      <div class="label">Descripción</div><div class="value">${t.descripcion||'—'}</div>
      ${t.notas?`<div class="label">Notas / Instrucciones</div><div class="value" style="color:#aaa">${t.notas}</div>`:''}
      ${t.proveedor?`<div class="label">Proveedor / Contratista</div><div class="value">${t.proveedor}</div>`:''}
      ${t.responsable_ms3?`<div class="label">Responsable MS3</div><div class="value">${t.responsable_ms3}</div>`:''}
      ${t.fecha_inicio||t.fecha_fin?`<div class="label">Fechas estimadas</div><div class="value">${t.fecha_inicio||'—'} → ${t.fecha_fin||'—'}</div>`:''}
      ${(t.adjuntos||[]).length?`<div class="label" style="margin-top:14px">Cotizaciones / Adjuntos (${t.adjuntos.length})</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:8px">${adjHtml}</div>`:''}
    </div>`;
  }).join('');

  // Sección de autorización
  let authSection='';
  if(data.estado_autorizacion==='autorizado'||data.estado_autorizacion==='rechazado'){
    const isOk = data.estado_autorizacion==='autorizado';
    authSection=`<div class="card" style="border-color:${isOk?'#4caf5060':'#ef535060'}">
      <div class="section-title" style="color:${isOk?'#4caf50':'#ef5350'}">${isOk?'✅ Trabajos autorizados':'❌ Trabajos rechazados'}</div>
      <div class="label">Autorizado por</div><div class="value">${data.autorizado_por||'—'}</div>
      ${data.comentario_autorizacion?`<div class="label">Comentario</div><div class="value">${data.comentario_autorizacion}</div>`:''}
      <div class="label">Fecha</div><div class="value">${fmtDT(data.fecha_autorizacion)}</div>
    </div>`;
  } else {
    authSection=`<div class="auth-box">
      <div class="section-title">Autorización requerida</div>
      <p style="font-size:13px;color:#aaa;margin-bottom:16px">
        Revisaste la información. Por favor ingresa tu nombre y decide si autorizas o rechazas la orden de trabajo.
        Esta acción quedará registrada y notificará al equipo MS3.
      </p>
      <div class="label">Tu nombre completo *</div>
      <input id="auth-nombre" placeholder="${rec.nombre||'Tu nombre'}" autocomplete="name">
      <button class="btn-authorize" onclick="autorizarOT()">✅ Autorizar orden de trabajo</button>
      <div id="reject-toggle" style="text-align:center;margin-bottom:6px">
        <span onclick="toggleRechazar()" style="color:#ef5350;font-size:13px;cursor:pointer;text-decoration:underline">❌ Rechazar / solicitar cambios</span>
      </div>
      <div id="reject-section">
        <div class="label">Motivo del rechazo *</div>
        <textarea id="auth-comentario" placeholder="Describe qué cambios se necesitan o por qué se rechaza..."></textarea>
        <button class="btn-reject" onclick="rechazarOT()">❌ Confirmar rechazo</button>
      </div>
    </div>`;
  }

  app.innerHTML=`
  <div style="margin-bottom:16px;padding:12px 16px;background:#2a2a2a;border-radius:10px;border:1px solid #444">
    <div style="font-size:10px;color:#b8860b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Solicitud enviada a</div>
    <div style="font-size:16px;font-weight:700;color:#eee">${rec.nombre||'Autorización pendiente'}</div>
    <div style="font-size:12px;color:#888">${rec.cargo||''}</div>
  </div>

  <div class="card">
    <div class="section-title">🏢 Sucursal</div>
    <div class="label">Nombre</div><div class="value">${suc.nombre||'—'}</div>
    <div class="label">Ciudad</div><div class="value">${suc.ciudad||'—'}</div>
    ${suc.direccion?`<div class="label">Dirección</div><div class="value" style="color:#aaa">${suc.direccion}</div>`:''}
  </div>

  <div class="card">
    <div class="section-title">🚨 Incidente reportado</div>
    <div class="label">Tipo</div><div class="value" style="font-size:16px;font-weight:700">${inc.tipo||'—'}</div>
    <div class="label">Urgencia</div><div class="value"><span class="badge ${urgBadge[inc.urgencia]||''}">${urgLabel[inc.urgencia]||inc.urgencia||'—'}</span></div>
    <div class="label">Descripción</div><div class="value" style="color:#aaa;white-space:pre-wrap">${inc.descripcion||'—'}</div>
    ${inc.reportante?`<div class="label">Reportado por</div><div class="value">${inc.reportante}</div>`:''}
    <div class="label">Fecha de reporte</div><div class="value">${inc.fecha||'—'}</div>
    ${inc.origen==='qr-form'?'<div style="font-size:11px;color:#888;margin-top:-8px">📲 Enviado vía formulario QR</div>':''}
    ${fotoSection ? `<div class="label" style="margin-top:14px">📷 Fotografía del incidente</div>${fotoSection}` : ''}
    ${fotosAdHtml ? `<div class="label" style="margin-top:14px">📷 Fotos adicionales</div>${fotosAdHtml}` : ''}
    ${planoHtml ? `<div class="label" style="margin-top:14px">📍 Ubicación en plano</div>${planoHtml}` : ''}
  </div>

  <div class="card">
    <div class="section-title">📋 Seguimiento MS3 (${seg.length})</div>
    ${segHtml}
  </div>

  ${anHtml}
  ${otCards}
  ${authSection}`;
}

async function autorizarOT(){
  const nombre=(document.getElementById('auth-nombre')?.value||'').trim();
  if(!nombre){alert('Por favor ingresa tu nombre completo.');return;}
  await guardarDecisionOT('autorizado',nombre,'');
}
async function rechazarOT(){
  const nombre=(document.getElementById('auth-nombre')?.value||'').trim();
  const comentario=(document.getElementById('auth-comentario')?.value||'').trim();
  if(!nombre){alert('Por favor ingresa tu nombre completo.');return;}
  if(!comentario){alert('Por favor describe el motivo del rechazo.');return;}
  await guardarDecisionOT('rechazado',nombre,comentario);
}
async function guardarDecisionOT(estado,nombre,comentario){
  document.querySelectorAll('.btn-authorize,.btn-reject').forEach(b=>{b.disabled=true;});
  try {
    await db.collection('autorizaciones').doc(authId).update({
      estado_autorizacion: estado,
      autorizado_por: nombre,
      comentario_autorizacion: comentario,
      fecha_autorizacion: new Date().toISOString()
    });
    const st=document.getElementById('status');
    st.className=estado==='autorizado'?'status-ok':'status-reject';
    st.style.display='block';
    st.innerHTML=estado==='autorizado'
      ?`<div style="font-size:28px;margin-bottom:10px">✅</div><div style="font-size:18px;font-weight:700">Orden de trabajo autorizada</div><div style="margin-top:8px;font-size:13px;opacity:.8">Autorizado por <strong>${nombre}</strong>. El equipo MS3 ha sido notificado.</div>`
      :`<div style="font-size:28px;margin-bottom:10px">❌</div><div style="font-size:18px;font-weight:700">Trabajos rechazados</div><div style="margin-top:8px;font-size:13px;opacity:.8">El equipo MS3 revisará tus comentarios.</div>`;
    document.querySelector('.auth-box')?.remove();
  } catch(e){
    alert('Error al guardar: '+e.message);
    document.querySelectorAll('.btn-authorize,.btn-reject').forEach(b=>{b.disabled=false;});
  }
}

let _folioData = null; // referencia global para guardarAutorizacion

function renderFolio(folio) {
  _folioData = folio;
  document.getElementById('loading').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'block';

  const r    = folio.reporteIA || {};
  const auth = folio.autorizacion || null;
  const ot   = folio.orden_trabajo_datos || null;
  const cots = folio.cotizaciones || [];
  const dx   = folio.diagnostico || {};
  const mat  = folio.materiales  || {};

  // Pipeline dinámico según flujo
  const esJanitor = folio.flujo === 'janitor';
  const etapasPip = esJanitor
    ? ['reporte','diagnostico','materiales','autorizacion','bitacora_evidencias','cerrado']
    : ['reporte','diagnostico','orden_trabajo','en_ejecucion','bitacora_evidencias','cerrado'];
  const etapaLabelPip = esJanitor
    ? {reporte:'Reporte',diagnostico:'Diagnóstico',materiales:'Materiales',autorizacion:'Autorización',bitacora_evidencias:'Evidencias',cerrado:'Cerrado'}
    : {reporte:'Reporte',diagnostico:'Diagnóstico',orden_trabajo:'ODT',en_ejecucion:'Ejecución',bitacora_evidencias:'Evidencias',cerrado:'Cerrado'};
  const etapaColorPip = {reporte:'#b8860b',diagnostico:'#2196f3',materiales:'#ff9800',autorizacion:'#ff9800',orden_trabajo:'#03a9f4',en_ejecucion:'#9c27b0',bitacora_evidencias:'#7b1fa2',cerrado:'#4caf50'};

  const etapaDisplay = ['cotizacion','pendiente_autorizacion'].includes(folio.etapa) ? 'orden_trabajo' : folio.etapa;

  const pipeline = etapasPip.map((e,i) => {
    const activo = e === etapaDisplay;
    const pasado = etapasPip.indexOf(etapaDisplay) > i;
    const col = pasado ? '#4caf50' : activo ? (etapaColorPip[e]||'#b8860b') : '#444';
    const lbl = etapaLabelPip[e]||e;
    const line = i < etapasPip.length-1
      ? `<div class="pip-line" style="background:${pasado?'#4caf50':'#333'}"></div>` : '';
    return `<div class="pip-step">
      <div class="pip-circle" style="background:${col}22;border:2px solid ${col};color:${col}">${pasado?'✓':i+1}</div>
      <div class="pip-label" style="color:${activo?col:'#666'}">${lbl}</div>
    </div>${line}`;
  }).join('');

  const fotosHtml = (folio.fotos||[]).length
    ? `<div class="fotos">${(folio.fotos||[]).map(f=>`<a href="${f.url}" target="_blank"><img src="${f.url}" onerror="this.style.display='none'"></a>`).join('')}</div>`
    : (folio.fotoBase64 ? `<div class="fotos"><img src="${folio.fotoBase64}" onclick="window.open(this.src)"></div>` : '<div style="color:#666;font-size:13px">Sin fotos adjuntas</div>');

  // Sección ODT
  const otHtml = ot?.descripcion ? `
  <div class="card" style="border-color:#2196f355">
    <div class="section-title" style="color:#64b5f6">📋 Orden de Trabajo — ${ot.folio_ot||''}</div>
    <div class="label">Tipo de trabajo</div><div class="value">${ot.tipo||'—'}</div>
    <div class="label">Descripción</div><div class="value" style="color:#aaa;white-space:pre-wrap">${ot.descripcion}</div>
    ${ot.contratista_sugerido?`<div class="label">Contratista / Proveedor sugerido</div><div class="value">${ot.contratista_sugerido}</div>`:''}
    ${ot.responsable_ms3?`<div class="label">Responsable MS3</div><div class="value">${ot.responsable_ms3}</div>`:''}
  </div>` : '';

  // Cotizaciones
  const cotsHtml = cots.length ? `
  <div class="card" style="border-color:#ff980055">
    <div class="section-title" style="color:#ffb74d">💰 Cotizaciones de proveedores (${cots.length})</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${cots.map(c=>`
        <div style="background:#1e1e1e;border:1px solid ${c.seleccionada?'#4caf50':'#444'};border-radius:8px;padding:12px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:8px">
            <div style="font-size:14px;font-weight:700;color:#eee;min-width:0;overflow-wrap:break-word">${c.proveedor}</div>
            <div style="font-size:16px;font-weight:700;color:#b8860b;flex-shrink:0">$${Number(c.monto||0).toLocaleString('es-MX')}</div>
          </div>
          ${c.nombre?`<div style="font-size:11px;color:#888">📄 ${c.nombre}</div>`:''}
          ${c.data?`<a href="${c.data}" download="${c.nombre||'cotizacion.pdf'}" style="display:inline-block;margin-top:8px;font-size:12px;color:#2196f3;text-decoration:none">⬇ Descargar cotización</a>`:''}
          ${c.seleccionada?'<div style="margin-top:6px;font-size:11px;color:#4caf50;font-weight:700">✓ Autorizada</div>':''}
        </div>`).join('')}
    </div>
  </div>` : '';

  // Diagnóstico
  const dxHtml = dx.propuesta_solucion ? `
  <div class="card" style="border-color:#2196f355">
    <div class="section-title" style="color:#64b5f6">🔍 Diagnóstico técnico</div>
    ${dx.notas?`<div class="label">Observaciones</div><div class="value" style="color:#aaa;white-space:pre-wrap">${dx.notas}</div>`:''}
    <div class="label">Propuesta de solución</div><div class="value" style="white-space:pre-wrap">${dx.propuesta_solucion}</div>
    ${dx.analizado_por?`<div class="label">Analizado por</div><div class="value">${dx.analizado_por}</div>`:''}
  </div>` : '';

  // Materiales (janitor)
  const matAdjuntos = mat.cotizaciones || [];
  const matAdjHtml = matAdjuntos.length ? matAdjuntos.map((a,ai)=>{
    if((a.tipo||'').startsWith('image/')||a.nombre?.match(/\.(jpg|jpeg|png|gif|webp)$/i)){
      return `<img src="${a.data}" style="width:100%;height:120px;object-fit:cover;border-radius:6px;border:1px solid #444;cursor:pointer;display:block" onclick="window.open(this.src)" title="${a.nombre||''}">`;
    }
    return `<a href="${a.data}" download="${a.nombre||'adjunto-'+ai+'.pdf'}" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1e1e1e;border:1px solid #444;border-radius:6px;font-size:12px;color:#2196f3;text-decoration:none">📄 ${a.nombre||'Adjunto '+(ai+1)}</a>`;
  }).join('') : '';
  const matHtml = (esJanitor && (mat.lista_materiales||mat.costo_materiales!=null||matAdjuntos.length)) ? `
  <div class="card" style="border-color:#ff980055">
    <div class="section-title" style="color:#ffb74d">🔧 Materiales requeridos</div>
    ${mat.lista_materiales?`<div class="label">Lista</div><div class="value" style="color:#aaa;white-space:pre-wrap">${mat.lista_materiales}</div>`:''}
    ${mat.costo_materiales!=null?`<div class="label">Costo estimado</div><div class="value" style="font-size:20px;font-weight:700;color:#b8860b">$${Number(mat.costo_materiales).toLocaleString('es-MX')} MXN</div>`:''}
    ${matAdjuntos.length?`<div class="label" style="margin-top:14px">Cotizaciones / Adjuntos (${matAdjuntos.length})</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:8px">${matAdjHtml}</div>`:''}
  </div>` : '';

  // Auth section
  const cotIdx = auth?.cotizacionSeleccionadaIdx;
  const cotSel = (cotIdx!=null&&cotIdx>=0) ? cots[cotIdx] : cots.find(c=>c.seleccionada);
  let authSection = '';
  if (auth) {
    const isOk = auth.estado === 'autorizado';
    authSection = `
    <div class="card" style="border-color:${isOk?'#4caf5060':'#ef535060'}">
      <div class="section-title" style="color:${isOk?'#4caf50':'#ef5350'}">${isOk?'✅ Trabajos autorizados':'❌ Trabajos rechazados'}</div>
      <div class="label">Autorizado por</div><div class="value">${auth.autorizadoPor||'—'}</div>
      <div class="label">Fecha</div><div class="value">${auth.fecha?new Date(auth.fecha).toLocaleDateString('es-MX',{dateStyle:'long'}):'—'}</div>
      ${auth.comentario?`<div class="label">Comentario</div><div class="value">${auth.comentario}</div>`:''}
      ${cotSel?`<div class="label" style="margin-top:12px">Cotización autorizada</div><div class="value" style="color:#4caf50">${cotSel.proveedor} — $${Number(cotSel.monto||0).toLocaleString('es-MX')} MXN</div>`:''}
    </div>`;
  } else if (['orden_trabajo','cotizacion','pendiente_autorizacion','autorizacion'].includes(folio.etapa)) {
    // Selector de cotización (si hay cotizaciones adjuntas)
    const cotSelector = cots.length ? `
      <div class="label" style="margin-bottom:8px">Selecciona la cotización a autorizar *</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">
        ${cots.map((c,i)=>`
          <label style="display:flex;align-items:flex-start;gap:10px;background:#2a2a2a;border:1px solid #555;border-radius:8px;padding:12px;cursor:pointer">
            <input type="radio" name="cot-sel" value="${i}" style="margin-top:3px;accent-color:#b8860b;cursor:pointer;flex-shrink:0">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:700;color:#eee;overflow-wrap:break-word">${c.proveedor}</div>
              <div style="font-size:12px;color:#888;overflow-wrap:break-word">$${Number(c.monto||0).toLocaleString('es-MX')} MXN${c.nombre?' · '+c.nombre:''}</div>
              ${c.data?`<a href="${c.data}" download="${c.nombre||'cotizacion.pdf'}" onclick="event.stopPropagation()" style="display:inline-block;margin-top:6px;font-size:11px;color:#2196f3;text-decoration:none">⬇ Descargar PDF</a>`:''}
            </div>
          </label>`).join('')}
      </div>` : '';
    const tipoTrabajo = esJanitor ? 'tarea interna' : 'orden de trabajo';
    authSection = `
    <div class="auth-box">
      <div class="section-title">Autorización requerida</div>
      <p style="font-size:13px;color:#aaa;margin-bottom:${cots.length?'20px':'16px'}">
        Revisa la información${cots.length?' y selecciona la cotización aprobada':''} para autorizar o rechazar ${esJanitor?'la tarea':'la orden de trabajo'}.
      </p>
      ${cotSelector}
      <div class="label">Tu nombre completo *</div>
      <input id="auth-nombre" placeholder="Ej. Dr. Francisco Ramos" autocomplete="name">
      <button class="btn-authorize" onclick="autorizar()">✅ Autorizar ${tipoTrabajo}</button>
      <div id="reject-toggle" style="text-align:center;margin-bottom:6px">
        <span onclick="toggleRechazar()" style="color:#ef5350;font-size:13px;cursor:pointer;text-decoration:underline">❌ Rechazar / solicitar cambios</span>
      </div>
      <div id="reject-section">
        <div class="label">Motivo del rechazo *</div>
        <textarea id="auth-comentario" placeholder="Describe qué cambios se necesitan o por qué se rechaza..."></textarea>
        <button class="btn-reject" onclick="rechazar()">❌ Confirmar rechazo</button>
      </div>
    </div>`;
  } else {
    authSection = `<div class="card" style="border-color:#33333388">
      <div style="color:#666;font-size:13px;text-align:center;padding:8px 0">
        Este folio está en etapa <strong style="color:#888">${folio.etapa}</strong> — no requiere autorización en este momento.
      </div>
    </div>`;
  }

  app.innerHTML = `
  <h2>${folio.sucursalNombre || folio.sucursalId}</h2>
  <div class="subtitle">${folio.sucursalId} · ${folio.sucursalCiudad||''} · ${folio._fecha||folio.creado?.slice(0,10)||''}</div>

  <div class="card">
    <div style="display:flex;align-items:center">${pipeline}</div>
  </div>

  <div class="card">
    <div class="section-title">🚨 Incidente reportado</div>
    <div class="label">Urgencia</div>
    <div class="value"><span class="badge ${urgBadge[folio.urgencia||r.urgencia]||''}">${urgLabel[folio.urgencia||r.urgencia]||folio.urgencia||'—'}</span></div>
    ${folio.titulo?`<div class="label">Título</div><div class="value" style="font-size:16px;font-weight:700">${folio.titulo}</div>`:''}
    <div class="label">Disciplina</div><div class="value">${folio.disciplina||folio.categoria||r.categoria||'—'}</div>
    <div class="label">Descripción</div><div class="value" style="color:#aaa;white-space:pre-wrap">${folio.descripcion||r.resumen||'—'}</div>
    ${folio.reportante?`<div class="label">Reportado por</div><div class="value">${folio.reportante}</div>`:''}
  </div>

  <div class="card">
    <div class="section-title">📷 Evidencia fotográfica</div>
    ${fotosHtml}
  </div>

  ${dxHtml}
  ${matHtml}
  ${otHtml}
  ${cotsHtml}
  ${authSection}`;
}

function toggleRechazar() {
  const s = document.getElementById('reject-section');
  const t = document.getElementById('reject-toggle');
  s.style.display = s.style.display === 'none' ? 'block' : 'none';
  t.style.display = s.style.display === 'block' ? 'none' : 'block';
}

async function autorizar() {
  const nombre = document.getElementById('auth-nombre')?.value?.trim();
  if (!nombre) { alert('Por favor ingresa tu nombre completo.'); return; }
  const cots = _folioData?.cotizaciones || [];
  if (cots.length) {
    const selIdx = [...document.querySelectorAll('input[name="cot-sel"]')].findIndex(r=>r.checked);
    if (selIdx < 0) { alert('Por favor selecciona la cotización a autorizar.'); return; }
    await guardarAutorizacion('autorizado', nombre, '', selIdx);
  } else {
    await guardarAutorizacion('autorizado', nombre, '', -1);
  }
}

async function rechazar() {
  const nombre     = document.getElementById('auth-nombre')?.value?.trim();
  const comentario = document.getElementById('auth-comentario')?.value?.trim();
  if (!nombre)     { alert('Por favor ingresa tu nombre completo.'); return; }
  if (!comentario) { alert('Por favor describe el motivo del rechazo.'); return; }
  await guardarAutorizacion('rechazado', nombre, comentario, -1);
}

async function guardarAutorizacion(estado, nombre, comentario, cotIdx) {
  document.querySelectorAll('.btn-authorize,.btn-reject').forEach(b=>{b.disabled=true});
  try {
    // Guardamos el índice en autorizacion — NO reescribimos cotizaciones[]
    // para evitar reenviar los PDFs en base64 y superar el límite de 1MB de Firestore
    const updates = {
      autorizacion: {
        estado, autorizadoPor: nombre, comentario,
        fecha: new Date().toISOString(),
        cotizacionSeleccionadaIdx: cotIdx >= 0 ? cotIdx : null
      }
    };
    await db.collection('folios').doc(folioId).update(updates);
    const st = document.getElementById('status');
    st.className = estado === 'autorizado' ? 'status-ok' : 'status-reject';
    st.style.display = 'block';
    st.innerHTML = estado === 'autorizado'
      ? `<div style="font-size:24px;margin-bottom:8px">✅</div><div style="font-size:16px;font-weight:700">Orden de trabajo autorizada</div><div style="margin-top:6px;font-size:13px;opacity:.8">Autorizado por <strong>${nombre}</strong>. El equipo MS3 ha sido notificado.</div>`
      : `<div style="font-size:24px;margin-bottom:8px">❌</div><div style="font-size:16px;font-weight:700">Trabajos rechazados</div><div style="margin-top:6px;font-size:13px;opacity:.8">El equipo MS3 revisará tus comentarios y se pondrá en contacto.</div>`;
    document.querySelector('.auth-box')?.remove();
  } catch(e) {
    alert('Error al guardar: ' + e.message);
    document.querySelectorAll('.btn-authorize,.btn-reject').forEach(b=>{b.disabled=false});
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').innerHTML = `
    <div class="not-found">
      <div class="icon">🔍</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">No encontrado</div>
      <div style="font-size:13px">${msg}</div>
    </div>`;
  document.getElementById('app').style.display = 'block';
}

firebase.auth().signInAnonymously().then(init).catch(e=>showError('Error de autenticación: '+e.message));
</script>
